<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little Things — Creative Design SOULutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #1a1208; --gold: #c8922a; --cream: #fdf8f2;
      --warm: #f5ede0; --text: #1a1208; --muted: #6b5d4f;
      --line: rgba(200,146,42,0.2); --sky: #4a8fc2;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; }

    /* ── NAV ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 4rem; background: rgba(253,248,242,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; color: var(--navy); letter-spacing: 0.02em; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; white-space: nowrap; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .has-dropdown { position: relative; }
    .has-dropdown > a { display: flex; align-items: center; gap: 0.3rem; }
    .caret { font-size: 0.55rem; opacity: 0.6; transition: transform 0.2s; }
    .has-dropdown:hover .caret { transform: rotate(180deg); }
    .dropdown { position: absolute; top: 100%; left: 50%; transform: translateX(-50%) translateY(-4px); min-width: 170px; background: #fdf8f2; border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 12px 32px rgba(26,18,8,0.12); list-style: none; padding: 0.75rem 0 0.5rem; opacity: 0; pointer-events: none; transition: opacity 0.18s, transform 0.18s; }
    .has-dropdown:hover .dropdown, .has-dropdown.open .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .dropdown li { padding: 0; }
    .dropdown a { display: block; padding: 0.6rem 1.1rem; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .dropdown a:hover { color: var(--gold); background: rgba(200,146,42,0.04); }
    .dropdown .drop-divider { height: 1px; background: var(--line); margin: 0.35rem 0.8rem; }
    .dropdown .drop-special a { color: var(--gold); font-weight: 600; }
    .nav-cta { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sky); text-decoration: none; border: 1.5px solid var(--sky); padding: 0.5rem 1.4rem; border-radius: 2px; transition: all 0.2s; }
    .nav-cta:hover { background: var(--sky); color: white; }

    /* ── HERO ── */
    .lt-hero { padding: 10rem 4rem 5rem; max-width: 900px; margin: 0 auto; text-align: center; }
    .section-label { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 1.2rem; }
    .lt-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 5vw, 3.6rem); font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
    .lt-hero h1 em { color: var(--gold); font-style: italic; }
    .lt-hero p { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 300; line-height: 1.7; color: var(--muted); max-width: 580px; margin: 0 auto; }

    /* ── TOOL SECTIONS ── */
    .tool-section { max-width: 1100px; margin: 0 auto 6rem; padding: 0 3rem; }
    .tool-header { display: grid; grid-template-columns: 1fr 1.6fr; gap: 3rem; align-items: start; margin-bottom: 2rem; }
    .tool-copy h2 { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 600; line-height: 1.1; margin-bottom: 0.75rem; }
    .tool-copy h2 em { color: var(--gold); font-style: italic; }
    .tool-copy p { font-size: 0.92rem; color: var(--muted); line-height: 1.7; }
    .tool-tag { display: inline-block; font-size: 0.56rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; border-radius: 99px; padding: 0.25rem 0.7rem; margin-bottom: 0.8rem; }
    .tag-live { background: #e3efe5; color: #4f7857; border: 1px solid rgba(79,120,87,0.2); }
    .tag-soon { background: rgba(200,146,42,0.1); color: var(--gold); border: 1px solid var(--line); }

    /* ── GLASS STICKY BOARD ── */
    #sticky-board {
      position: relative;
      min-height: 440px;
      background: #0f0f1a;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(91,138,245,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(196,118,142,0.1) 0%, transparent 55%);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .board-controls {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      display: flex; align-items: center; gap: 8px;
    }
    .board-add {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8); font-size: 17px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .board-add:hover { background: rgba(255,255,255,0.22); }
    .board-color-dot {
      width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
      border: 1.5px solid transparent; transition: transform 0.12s, border-color 0.12s;
    }
    .board-color-dot:hover { transform: scale(1.25); }
    .board-color-dot.selected { border-color: rgba(255,255,255,0.8); }
    .board-hint {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em;
      text-transform: uppercase; pointer-events: none; white-space: nowrap;
    }

    /* ── Individual glass sticky ── */
    .gs-note {
      position: absolute;
      width: 220px; min-height: 180px;
      border-radius: 16px;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.18);
      cursor: default;
      user-select: none;
    }
    .gs-glass { position: absolute; inset: 0; background: rgba(255,255,255,0.07); pointer-events: none; border-radius: 16px; }
    .gs-tint  { position: absolute; inset: 0; opacity: 0.32; pointer-events: none; border-radius: 16px; }
    .gs-shine { position: absolute; top: 0; left: 0; right: 0; height: 45%; border-radius: 16px 16px 60% 60% / 16px 16px 30px 30px; background: linear-gradient(to bottom, rgba(255,255,255,0.18), transparent); pointer-events: none; }
    .gs-header {
      position: relative; z-index: 2;
      display: flex; align-items: center; gap: 6px;
      padding: 10px 12px 7px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      cursor: grab;
    }
    .gs-header:active { cursor: grabbing; }
    .gs-close {
      width: 15px; height: 15px; border-radius: 50%; border: none;
      background: rgba(255,70,70,0.55); color: rgba(255,255,255,0.9);
      font-size: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s; line-height: 1;
    }
    .gs-close:hover { background: rgba(255,50,50,0.9); }
    .gs-spacer { flex: 1; }
    .gs-body { position: relative; z-index: 2; flex: 1; padding: 10px 12px 6px; }
    .gs-body textarea {
      width: 100%; height: 100%; min-height: 110px;
      background: transparent; border: none; outline: none; resize: none;
      overflow-y: auto; scrollbar-width: none;
      color: rgba(255,255,255,0.9);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 13px; line-height: 1.6;
      caret-color: rgba(255,255,255,0.8); cursor: text;
    }
    .gs-body textarea::placeholder { color: rgba(255,255,255,0.3); }
    .gs-body textarea::-webkit-scrollbar { display: none; }
    .gs-date { position: relative; z-index: 2; padding: 0 12px 9px; font-size: 9px; color: rgba(255,255,255,0.28); letter-spacing: 0.04em; }

    /* ── VAULT (placeholder for now) ── */
    .vault-placeholder {
      background: rgba(30,40,60,0.04);
      border: 1.5px dashed var(--line);
      border-radius: 16px; min-height: 320px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.75rem; text-align: center; padding: 2rem;
    }
    .vault-placeholder .ph-icon { font-size: 2.8rem; opacity: 0.3; }
    .vault-placeholder p { font-size: 0.82rem; color: var(--muted); max-width: 280px; line-height: 1.6; }

    /* ── Dividers ── */
    .tool-divider { max-width: 1100px; margin: 0 auto 5rem; padding: 0 3rem; border-top: 1px solid var(--line); }

    /* ── CTA ── */
    .lt-cta { text-align: center; padding: 5rem 3rem 8rem; background: var(--warm); border-top: 1px solid var(--line); }
    .lt-cta h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 700; margin-bottom: 1rem; line-height: 1.2; }
    .lt-cta h2 em { color: var(--gold); font-style: italic; }
    .lt-cta p { font-size: 0.92rem; color: var(--muted); max-width: 460px; margin: 0 auto 2rem; line-height: 1.7; }
    .btn-cta { display: inline-block; background: var(--gold); color: white; font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; padding: 0.9rem 2.2rem; border-radius: 3px; transition: background 0.2s; }
    .btn-cta:hover { background: #a8781e; }

    /* ── Responsive ── */
    @media(max-width: 860px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .lt-hero { padding: 8rem 1.5rem 4rem; }
      .tool-section { padding: 0 1.5rem; margin-bottom: 4rem; }
      .tool-header { grid-template-columns: 1fr; gap: 1.5rem; }
      .tool-divider { padding: 0 1.5rem; }
    }
    @media(max-width: 600px) {
      .nav-links { display: none; }
      #sticky-board { min-height: 360px; }
    }
  </style>
</head>

<script>
// ─── GLASS STICKIES ─────────────────────────────
const COLORS = ['#5b8af5','#a78bfa','#34d399','#c9768e','#f472b6'];
let activeColor = COLORS[0];
let zTop = 10;
const board = document.getElementById('sticky-board');
const SK = 'gs-notes-v2';

// Color picker
document.querySelectorAll('.board-color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.board-color-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
    activeColor = dot.dataset.color;
  });
});
document.getElementById('board-add-btn').addEventListener('click', () => addNote());

function makeNote(data) {
  const bw = board.clientWidth  || 800;
  const bh = board.clientHeight || 440;
  const n = data || {
    id: Date.now(),
    color: activeColor,
    text: '',
    x: 40  + Math.random() * Math.max(0, bw - 280),
    y: 40  + Math.random() * Math.max(0, bh - 220),
  };

  const el = document.createElement('div');
  el.className = 'gs-note';
  el.dataset.id = n.id;
  el.style.cssText = `left:${n.x}px;top:${n.y}px;z-index:${++zTop};`;

  el.innerHTML = `
    <div class="gs-glass"></div>
    <div class="gs-tint" style="background:${n.color}"></div>
    <div class="gs-shine"></div>
    <div class="gs-header" style="border-bottom-color:${n.color}55">
      <button class="gs-close" title="Close">✕</button>
      <div class="gs-spacer"></div>
    </div>
    <div class="gs-body">
      <textarea placeholder="Type a note…">${n.text || ''}</textarea>
    </div>
    <div class="gs-date">${new Date(n.id).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`;

  el.querySelector('.gs-close').addEventListener('click', () => { el.remove(); save(); });
  el.querySelector('textarea').addEventListener('input', save);

  makeDraggable(el);
  board.appendChild(el);
  if (!data) el.querySelector('textarea').focus();
  save();
}

function makeDraggable(el) {
  const header = el.querySelector('.gs-header');
  let ox, oy, down = false;

  header.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    down = true;
    el.style.zIndex = ++zTop;
    const r = el.getBoundingClientRect();
    const br = board.getBoundingClientRect();
    ox = e.clientX - (r.left - br.left);
    oy = e.clientY - (r.top  - br.top);
    e.preventDefault();
  });

  // Touch support
  header.addEventListener('touchstart', e => {
    if (e.target.tagName === 'BUTTON') return;
    down = true;
    el.style.zIndex = ++zTop;
    const t = e.touches[0];
    const r = el.getBoundingClientRect();
    const br = board.getBoundingClientRect();
    ox = t.clientX - (r.left - br.left);
    oy = t.clientY - (r.top  - br.top);
  }, { passive: true });

  window.addEventListener('mousemove', e => {
    if (!down) return;
    const br = board.getBoundingClientRect();
    el.style.left = Math.max(0, Math.min(br.width  - 220, e.clientX - br.left - ox)) + 'px';
    el.style.top  = Math.max(0, Math.min(br.height - 180, e.clientY - br.top  - oy)) + 'px';
  });
  window.addEventListener('touchmove', e => {
    if (!down) return;
    const t = e.touches[0];
    const br = board.getBoundingClientRect();
    el.style.left = Math.max(0, Math.min(br.width  - 220, t.clientX - br.left - ox)) + 'px';
    el.style.top  = Math.max(0, Math.min(br.height - 180, t.clientY - br.top  - oy)) + 'px';
  }, { passive: true });
  window.addEventListener('mouseup',  () => { if (down) { down = false; save(); } });
  window.addEventListener('touchend', () => { if (down) { down = false; save(); } });
}

function save() {
  const data = [];
  board.querySelectorAll('.gs-note').forEach(el => {
    data.push({
      id: +el.dataset.id,
      color: el.querySelector('.gs-tint').style.background,
      text: el.querySelector('textarea').value,
      x: parseFloat(el.style.left),
      y: parseFloat(el.style.top),
    });
  });
  try { localStorage.setItem(SK, JSON.stringify(data)); } catch {}
}

function load() {
  try {
    const saved = JSON.parse(localStorage.getItem(SK) || '[]');
    if (saved.length) { saved.forEach(n => makeNote(n)); return; }
  } catch {}
  // Seed demo notes
  setTimeout(() => {
    makeNote({ id: Date.now()-3000, color:'#5b8af5', text:'Follow up with client re: launch timeline', x:48, y:50 });
    makeNote({ id: Date.now()-2000, color:'#34d399', text:'Vendor order arriving Tuesday AM', x:290, y:70 });
    makeNote({ id: Date.now()-1000, color:'#a78bfa', text:'New feature ideas:\n– team notes\n– auto-close\n– themes', x:150, y:210 });
    makeNote({ id: Date.now(),      color:'#f472b6', text:'Don\'t forget:\nbackup configs\nbefore deploy', x:530, y:55 });
  }, 80);
}

load();

// ─── DROPDOWN ────────────────────────────────
document.querySelectorAll('.has-dropdown > a').forEach(link => {
  link.addEventListener('click', e => {
    const li = link.closest('.has-dropdown');
    const open = li.classList.contains('open');
    document.querySelectorAll('.has-dropdown').forEach(el => el.classList.remove('open'));
    if (!open) { e.preventDefault(); li.classList.add('open'); }
  });
});
document.addEventListener('click', e => {
  if (!e.target.closest('.has-dropdown')) document.querySelectorAll('.has-dropdown').forEach(el => el.classList.remove('open'));
});
</script>
</body>
</html>

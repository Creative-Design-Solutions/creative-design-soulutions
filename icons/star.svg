<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Bright sky — warm gold core radiating out to soft dawn blue -->
    <radialGradient id="si-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#FFFEF0"/>
      <stop offset="20%"  stop-color="#FFF4B0"/>
      <stop offset="45%"  stop-color="#FFE07A"/>
      <stop offset="70%"  stop-color="#C8D8F0"/>
      <stop offset="100%" stop-color="#8AAED8"/>
    </radialGradient>
    <!-- Wide bloom of light behind the star -->
    <radialGradient id="si-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%"  stop-color="#FFE880" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#FFD040" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFD040" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold trim gradient for border -->
    <linearGradient id="si-trim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5e090"/>
      <stop offset="25%"  stop-color="#c8922a"/>
      <stop offset="50%"  stop-color="#f0c84a"/>
      <stop offset="75%"  stop-color="#a06820"/>
      <stop offset="100%" stop-color="#e8c060"/>
    </linearGradient>
    <!-- Arm gold A -->
    <linearGradient id="si-goldA" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="20%"  stop-color="#FFE570"/>
      <stop offset="55%"  stop-color="#D4A020"/>
      <stop offset="80%"  stop-color="#FFE060"/>
      <stop offset="100%" stop-color="#FFFAC0"/>
    </linearGradient>
    <!-- Arm gold B -->
    <linearGradient id="si-goldB" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%"   stop-color="#FFFCE8"/>
      <stop offset="30%"  stop-color="#FFE060"/>
      <stop offset="65%"  stop-color="#DDA010"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Halo ring -->
    <linearGradient id="si-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="0.95"/>
      <stop offset="25%"  stop-color="#FFE570"  stop-opacity="0.80"/>
      <stop offset="50%"  stop-color="#D4A020"  stop-opacity="0.60"/>
      <stop offset="75%"  stop-color="#FFE060"  stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#FFFAC0"  stop-opacity="0.95"/>
    </linearGradient>
    <filter id="si-depth">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#8B6000" flood-opacity="0.25"/>
    </filter>
    <filter id="si-armglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="si-ringGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bright sky background -->
  <rect width="1024" height="1024" rx="220" fill="url(#si-bg)"/>

  <!-- Wide light bloom -->
  <circle cx="512" cy="512" r="490" fill="url(#si-bloom)"/>

  <!-- Halo ring -->
  <circle cx="512" cy="512" r="295"
    fill="none" stroke="url(#si-ring)" stroke-width="7"
    filter="url(#si-ringGlow)" opacity="0.92"/>

  <!-- Six arms -->
  <g filter="url(#si-depth)">
    <path d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="url(#si-goldA)"/>
    <path transform="rotate(60 512 512)"  d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="url(#si-goldB)"/>
    <path transform="rotate(120 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="url(#si-goldA)"/>
    <path transform="rotate(180 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="url(#si-goldB)"/>
    <path transform="rotate(240 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="url(#si-goldA)"/>
    <path transform="rotate(300 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="url(#si-goldB)"/>
  </g>

  <!-- Arm glow layer -->
  <g filter="url(#si-armglow)" opacity="0.45">
    <path d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="#FFE570"/>
    <path transform="rotate(60 512 512)"  d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="#FFE570"/>
    <path transform="rotate(120 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="#FFE570"/>
    <path transform="rotate(180 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="#FFE570"/>
    <path transform="rotate(240 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="#FFE570"/>
    <path transform="rotate(300 512 512)" d="M 512,512 C 470,470 460,370 512,270 C 564,370 554,470 512,512 Z" fill="#FFE570"/>
  </g>

  <!-- Centre jewel -->
  <circle cx="512" cy="512" r="30" fill="url(#si-goldA)" filter="url(#si-depth)"/>
  <circle cx="512" cy="512" r="14" fill="#FFFFFF" opacity="0.85"/>

  <!-- Gold trim border -->
  <rect x="10" y="10" width="1004" height="1004" rx="213"
    fill="none" stroke="url(#si-trim)" stroke-width="8" opacity="0.85"/>

</svg>
